apiVersion: apps/v1
kind: Deployment
metadata:
  name: configure-alertmanager-operator
  namespace: openshift-monitoring
  labels:
    olm.deployment-spec-hash: simulated
    olm.managed: "true"
    olm.owner: configure-alertmanager-operator.v0.1.0-simulated
    olm.owner.kind: ClusterServiceVersion
    olm.owner.namespace: openshift-monitoring
    operators.coreos.com/configure-alertmanager-operator.openshift-monitoring: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      name: configure-alertmanager-operator
  template:
    metadata:
      labels:
        name: configure-alertmanager-operator
    spec:
      serviceAccountName: configure-alertmanager-operator
      containers:
      - name: configure-alertmanager-operator
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["sleep", "infinity"]
        resources:
          limits:
            cpu: 200m
            memory: 1Gi
